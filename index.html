<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draco - Chatbot</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', 'Poppins', sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}

body.light {
  background: linear-gradient(145deg, #f5f5f7, #e0e0e0);
  color: #222;
}

body.dark {
  background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
  color: #f0f0f0;
}

/* Navbar */
.navbar {
  display: flex;
  align-items: center;
  padding: 12px 25px;
  backdrop-filter: blur(25px);
  background: rgba(255, 255, 255, 0.5);
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 0 0 25px 25px;
  transition: background 0.5s ease, color 0.5s ease;
  position: relative;
}

body.dark .navbar {
  background: rgba(40, 40, 40, 0.5);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.navbar h1 {
  flex: 1;
  text-align: center;
  font-weight: 700;
  font-size: 24px;
  color: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* Logo */
.logo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(15px);
  padding: 5px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
  object-fit: cover;
  transition: transform 0.3s ease;
}

.logo:hover {
  transform: scale(1.1);
}

.logo img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  position: relative;
  z-index: 3;
}

/* Window Buttons (Mac-style) */
.window-buttons {
  display: flex;
  gap: 10px;
  position: absolute;
  left: 20px;
}

.window-buttons span {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: block;
  cursor: pointer;
  opacity: 0.9;
  transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
  animation: buttonGlow 3s ease-in-out infinite;
}

.window-buttons span:hover {
  transform: scale(1.2);
  box-shadow: 0 0 10px currentColor;
  opacity: 1;
}

@keyframes buttonGlow {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.05); opacity: 1; }
}

.window-buttons .close { background: #ff605c; box-shadow: 0 0 8px rgba(255, 96, 92, 0.5); }
.window-buttons .minimize { background: #ffbd44; box-shadow: 0 0 8px rgba(255, 189, 68, 0.5); }
.window-buttons .maximize { background: #00ca4e; box-shadow: 0 0 8px rgba(0, 202, 78, 0.5); }

/* Draco Text Glow */
.draco-text {
  color: #00AEEF;
  font-weight: 700;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(0, 191, 255, 0.3);
}

body.dark .draco-text {
  background: none;
  -webkit-text-fill-color: #fff;
  text-shadow: none;
  animation: none;
}

/* Dark Mode RGB Border Glow on Logo */
body.dark .logo::before {
  content: "";
  position: absolute;
  top: -3px;
  left: -3px;
  width: calc(100% + 6px);
  height: calc(100% + 6px);
  border-radius: 50%;
  background: conic-gradient(from 0deg, #ff0000, #ff9900, #ffff00, #33ff00, #00ffff, #0066ff, #cc00ff, #ff0099, #ff0000);
  animation: spinRGB 4s linear infinite, pulseGlow 1.5s ease-in-out infinite alternate;
  z-index: 0;
  filter: blur(4px) brightness(1.3);
  opacity: 0.9;
}

@keyframes spinRGB {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes pulseGlow {
  0% { filter: blur(3px) brightness(1.3); opacity: 0.8; }
  100% { filter: blur(5px) brightness(2); opacity: 1; }
}

/* Agent Mode Popup */
.agent-mode-box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  padding: 25px 50px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  font-size: 22px;
  font-weight: 600;
  color: #111;
  opacity: 0;
  transition: all 0.5s ease;
  z-index: 9999;
}

body.dark .agent-mode-box {
  background: rgba(30, 30, 30, 0.85);
  color: #00ffcc;
  box-shadow: 0 0 30px rgba(0, 255, 200, 0.3);
}

.agent-mode-box.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* Theme Switch */
.theme-switch {
  position: absolute;
  right: 20px;
  display: flex;
  justify-content: center;
  direction: rtl;
}

#theme-checkbox { display: none; }

#theme-checkbox + label {
  font-size: 2rem;
  height: 1em;
  width: 2.5em;
  border-radius: 0.25em;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  background-color: #cecece;
  position: relative;
}

#theme-checkbox:checked + label {
  background-color: #3a3a3a;
}

#theme-checkbox + label:active {
  transform: scale(0.85);
  transition: transform 0.2s;
}

#theme-checkbox + label div {
  width: 0.8em;
  height: 0.8em;
  border-radius: inherit;
  position: absolute;
  top: 0.1em;
  left: 0.1em;
  z-index: 10;
  transition: 0.5s cubic-bezier(1, 0.33, 0.11, 1.34);
  background-color: #f2f2f2;
}

#theme-checkbox:checked + label div {
  left: 1.6em;
  background-color: #212121;
}

#theme-checkbox + label span { display: flex; }
#theme-checkbox + label svg {
  display: inline-block;
  height: 1em;
  width: 1em;
  padding: 0.15em;
  box-sizing: border-box;
}

#theme-checkbox + label span:first-of-type { color: #3a3a3a; }
#theme-checkbox + label span:last-of-type { color: #cecece; }

/* Chat Area */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 25px;
  position: relative;
  overflow: hidden;
}

.chat-window {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(25px);
  border-radius: 30px;
  box-shadow: 0 10px 35px rgba(0, 0, 0, 0.1);
  transition: background 0.5s ease;
}

body.dark .chat-window {
  background: rgba(50, 50, 50, 0.3);
}

/* Messages */
.message {
  max-width: 75%;
  padding: 14px 20px;
  border-radius: 15px;
  animation: slideFade 0.4s ease forwards;
  position: relative;
  transition: all 0.4s ease;
  word-wrap: break-word;
}

.user-message {
  align-self: flex-end;
  background: linear-gradient(145deg, #cce4ff, #a0d2ff);
  color: #000;
  box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
  cursor: pointer;
}

.user-message:hover {
  transform: scale(1.02);
}

body.dark .user-message {
  background: linear-gradient(145deg, #3a7bd5, #1f3a93);
  color: #fff;
}

.draco-message {
  align-self: flex-start;
  background: rgba(255, 255, 255, 0.85);
  box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
  color: #222;
}

body.dark .draco-message {
  background: rgba(60, 60, 60, 0.85);
  color: #f0f0f0;
}

/* Input Area */
.input-area {
  display: flex;
  gap: 15px;
  padding-top: 25px;
  margin-top: 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.input-area input {
  flex: 1;
  padding: 14px 22px;
  border-radius: 15px;
  border: none;
  outline: none;
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(15px);
  transition: all 0.3s ease;
  box-shadow: 0 3px 15px rgba(0, 0, 0, 0.1);
}

body.dark .input-area input {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 4px 20px rgba(255,255,255,0.1);
  backdrop-filter: blur(25px);
}

.input-area input:focus {
  box-shadow: 0 0 25px rgba(100, 150, 255, 0.4);
  transform: scale(1.02);
}

#send-btn {
  padding: 0 25px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 600;
  box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

#send-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,150,255,0.4);
}

body.dark #send-btn {
  background: #3a7bd5;
}

/* Typing Indicator */
.typing::after {
  content: "";
  display: inline-block;
  width: 6px;
  height: 6px;
  margin-left: 5px;
  border-radius: 50%;
  background: #888;
  animation: blink 1s infinite alternate,
             blink2 1s infinite 0.3s,
             blink3 1s infinite 0.6s;
}

@keyframes blink {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

@keyframes slideFade {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Footer */
.footer {
  text-align: center;
  padding: 12px 0;
  font-size: 14px;
  color: inherit;
  position: relative;
  z-index: 1;
}

/* Responsive */
@media (max-width: 600px) {
  .message { max-width: 90%; }
  .navbar h1 { font-size: 20px; }
}
</style>
</head>
